name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Client - Install and Build
      working-directory: ./client
      run: |
        npm ci || npm install
        npm run build
        
    - name: Client - Run Tests
      working-directory: ./client
      run: |
        npm run test --if-present

    - name: Client - Lint
      working-directory: ./client
      run: |
        npm run lint

    - name: Server - Install Dependencies and Test
      working-directory: ./server
      run: |
        npm ci || npm install
        npm test
